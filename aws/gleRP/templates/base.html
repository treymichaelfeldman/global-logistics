<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="ISO-8859-1">
  <meta http-equiv="X-UA-Compatible" content="IE=5">
  <meta name="viewport" content="width=800">
  <title>glERP v2.1 — Global Logistics Inc.</title>
  <style>
    /* ── 90s ERP Core Styles ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #008080;
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      color: #000000;
    }

    /* Title bar */
    #titlebar {
      background: #000080;
      color: #ffffff;
      font-weight: bold;
      font-size: 13px;
      padding: 3px 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #ffffff;
    }
    /* Menu bar */
    #menubar {
      background: #c0c0c0;
      border-bottom: 2px solid #808080;
      padding: 2px 4px;
      display: flex;
      gap: 0;
    }
    #menubar a {
      color: #000000;
      text-decoration: none;
      padding: 2px 10px;
      border: 2px outset #ffffff;
      font-size: 11px;
      font-weight: bold;
      background: #c0c0c0;
      display: inline-block;
    }
    #menubar a:hover, #menubar a.active {
      border: 2px inset #808080;
      background: #a0a0a0;
    }

    /* Main window */
    #main {
      margin: 8px;
      background: #c0c0c0;
      border: 3px outset #ffffff;
      padding: 0;
    }

    /* Window chrome */
    .win-title {
      background: #000080;
      color: #ffffff;
      font-weight: bold;
      font-size: 11px;
      padding: 2px 6px;
      letter-spacing: 1px;
    }

    .win-body {
      padding: 8px;
      background: #c0c0c0;
    }

    /* Panels */
    .panel {
      border: 2px inset #808080;
      background: #ffffff;
      padding: 6px;
      margin-bottom: 8px;
    }
    .panel-label {
      font-size: 10px;
      font-weight: bold;
      color: #000080;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      border-bottom: 1px solid #808080;
    }

    /* Buttons */
    .btn {
      background: #c0c0c0;
      border: 2px outset #ffffff;
      font-family: "Courier New", Courier, monospace;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 12px;
      cursor: pointer;
      text-decoration: none;
      color: #000000;
      display: inline-block;
    }
    .btn:active, .btn:hover {
      border: 2px inset #808080;
    }
    .btn-primary {
      background: #000080;
      color: #ffffff;
      border-color: #0000ff;
    }
    .btn-danger {
      background: #800000;
      color: #ffffff;
    }

    /* Tables */
    table.grid {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    table.grid th {
      background: #000080;
      color: #ffffff;
      padding: 3px 6px;
      text-align: left;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-right: 1px solid #404080;
    }
    table.grid td {
      padding: 2px 6px;
      border-bottom: 1px solid #c0c0c0;
      border-right: 1px dashed #c0c0c0;
      background: #ffffff;
      vertical-align: top;
    }
    table.grid tr:nth-child(even) td {
      background: #f0f0f0;
    }
    table.grid tr:hover td {
      background: #cce0ff;
    }
    table.grid td a {
      color: #000080;
      font-weight: bold;
      text-decoration: underline;
    }

    /* Forms */
    input[type=text], input[type=password], select {
      border: 2px inset #808080;
      background: #ffffff;
      font-family: "Courier New", Courier, monospace;
      font-size: 11px;
      padding: 2px 4px;
    }
    label { font-size: 11px; font-weight: bold; }

    /* Status badges */
    .badge {
      font-size: 10px;
      font-weight: bold;
      padding: 1px 6px;
      border: 1px solid;
      display: inline-block;
    }
    .badge-transit   { background: #ffffcc; border-color: #cccc00; color: #666600; }
    .badge-delayed   { background: #ffcccc; border-color: #cc0000; color: #800000; }
    .badge-delivered { background: #ccffcc; border-color: #00cc00; color: #006600; }
    .badge-callback  { background: #cce0ff; border-color: #0066cc; color: #003399; }

    .sent-pos  { color: #006600; font-weight: bold; }
    .sent-neu  { color: #333333; }
    .sent-fru  { color: #cc0000; font-weight: bold; }

    /* Status bar */
    #statusbar {
      background: #c0c0c0;
      border-top: 2px solid #808080;
      padding: 2px 8px;
      font-size: 10px;
      color: #444444;
      display: flex;
      justify-content: space-between;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
    }

    /* Flash messages */
    .flash {
      background: #ffff00;
      border: 2px solid #cc0000;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 11px;
      margin-bottom: 6px;
    }

    /* Search bar */
    .searchbar {
      background: #e0e0e0;
      border: 2px inset #808080;
      padding: 4px 6px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>

<div id="titlebar">
  <span>&#9632; glERP v2.1 — Enterprise Resource Planning System — Global Logistics Inc.</span>
  <span>&#9632; CONNECTED &#9632;</span>
</div>

<div id="menubar">
  <a href="{{ url_for('dashboard') }}" {% if request.endpoint == 'dashboard' %}class="active"{% endif %}>[ MAIN MENU ]</a>
  <a href="{{ url_for('shipments') }}" {% if request.endpoint in ('shipments','shipment_detail') %}class="active"{% endif %}>[ SHIPMENTS ]</a>
  <a href="{{ url_for('contacts') }}" {% if request.endpoint == 'contacts' %}class="active"{% endif %}>[ CONTACTS ]</a>
  <a href="{{ url_for('logout') }}" style="margin-left:auto;">[ LOG OFF ]</a>
</div>

<div id="main">
  {% block content %}{% endblock %}
</div>

<div id="statusbar">
  <span>glERP&#169; 1997-2003 Global Logistics Systems Corp. | Build 2.1.4903</span>
  <span id="clock"></span>
</div>

<script>
  function tick() {
    var now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleDateString('en-US') + '  ' + now.toLocaleTimeString('en-US', {hour12:false});
  }
  tick(); setInterval(tick, 1000);
</script>
</body>
</html>
